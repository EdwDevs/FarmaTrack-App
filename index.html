
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FarmaTrack - Abbott</title>
    <!-- Cargamos las herramientas de diseño y lógica -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .h-dvh { height: 100dvh; }
        .toast-enter { transform: translateY(-100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <!-- Se añade data-type="module" para permitir el uso de import dentro de Babel -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByZRT5UnrkgXcWe9t8lR636DfxgfhvXfQ",
            authDomain: "farmatrack-613fb.firebaseapp.com",
            projectId: "farmatrack-613fb",
            storageBucket: "farmatrack-613fb.firebasestorage.app",
            messagingSenderId: "32369328973",
            appId: "1:32369328973:web:3747e6f7606815d87f2d04"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- COMPONENTE DE NOTIFICACIÓN (TOAST) ---
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgClass = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info';

            return (
                <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl shadow-2xl text-white font-bold flex items-center space-x-3 transition-all duration-300 animate-bounce`}>
                    <div className={`${bgClass} flex items-center space-x-3 px-4 py-2 rounded-xl`}>
                        <i data-lucide={icon} className="w-5 h-5"></i>
                        <span className="text-xs uppercase tracking-wider">{message}</span>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [activeTab, setActiveTab] = useState('inicio');
            const [farmacias, setFarmacias] = useState([]);
            const [productos, setProductos] = useState([]);
            const [visitas, setVisitas] = useState([]);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [toast, setToast] = useState(null);

            // Función global para mostrar avisos
            const showNotice = useCallback((msg, type = 'success') => {
                setToast({ msg, type });
            }, []);

            // 1. Manejo de Autenticación
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Error en auth:", err);
                        if (err.code === 'auth/configuration-not-found') {
                            setAuthError("Debes habilitar el 'Inicio de sesión anónimo' en tu consola de Firebase (Authentication > Sign-in method).");
                        } else {
                            setAuthError("Error al conectar con el servidor de seguridad.");
                        }
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setAuthError(null);
                    }
                });
                
                const handleStatus = () => setIsOnline(navigator.onLine);
                window.addEventListener('online', handleStatus);
                window.addEventListener('offline', handleStatus);
                
                return () => {
                    unsubscribe();
                    window.removeEventListener('online', handleStatus);
                    window.removeEventListener('offline', handleStatus);
                };
            }, []);

            // 2. Carga de datos
            useEffect(() => {
                if (!user) return;

                const farmaciasRef = collection(db, 'farmacias');
                const productosRef = collection(db, 'productos');
                const visitasRef = collection(db, 'visitas');

                const unsubF = onSnapshot(farmaciasRef, (s) => setFarmacias(s.docs.map(d => ({id: d.id, ...d.data()}))), (err) => console.error("Error Farmacias:", err));
                const unsubP = onSnapshot(productosRef, (s) => setProductos(s.docs.map(d => ({id: d.id, ...d.data()}))), (err) => console.error("Error Productos:", err));
                const unsubV = onSnapshot(visitasRef, (s) => setVisitas(s.docs.map(d => ({id: d.id, ...d.data()}))), (err) => console.error("Error Visitas:", err));

                return () => { unsubF(); unsubP(); unsubV(); };
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, farmacias, productos, visitas, user, authError, toast]);

            if (authError) return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-white text-center">
                    <div className="bg-red-100 p-6 rounded-full text-red-600 mb-6">
                        <i data-lucide="shield-alert" className="w-12 h-12"></i>
                    </div>
                    <h2 className="text-xl font-black text-gray-800 mb-4 uppercase">Configuración Requerida</h2>
                    <p className="text-gray-500 mb-6 text-sm leading-relaxed">{authError}</p>
                    <div className="bg-gray-50 p-4 rounded-xl text-[10px] text-left text-gray-400 font-mono">
                        Pasos:<br/>
                        1. Ve a console.firebase.google.com<br/>
                        2. Entra en tu proyecto FarmaTrack<br/>
                        3. Ve a Authentication > Sign-in method<br/>
                        4. Haz clic en 'Agregar nuevo proveedor'<br/>
                        5. Selecciona 'Anónimo' y dale a 'Habilitar'
                    </div>
                </div>
            );

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4 bg-white">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
                    <p className="text-gray-500 font-bold animate-pulse tracking-widest text-xs">AUTENTICANDO...</p>
                </div>
            );

            return (
                <div className="flex flex-col h-dvh overflow-hidden bg-gray-50">
                    {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {!isOnline && (
                        <div className="bg-red-600 text-white text-[10px] font-bold py-1 px-4 flex items-center justify-center shrink-0">
                            <i data-lucide="wifi-off" className="w-3 h-3 mr-2"></i> MODO SIN CONEXIÓN ACTIVO
                        </div>
                    )}

                    <header className="bg-blue-700 text-white p-4 shadow-lg flex justify-between items-center shrink-0">
                        <div className="flex items-center space-x-2">
                            <i data-lucide="clipboard-check" className="w-6 h-6"></i>
                            <h1 className="text-xl font-bold tracking-tight">FarmaTrack <span className="text-[10px] bg-blue-500 px-2 py-0.5 rounded ml-2 uppercase">Abbott</span></h1>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 md:p-8 max-w-5xl mx-auto w-full pb-24">
                        {activeTab === 'inicio' && <InicioView setTab={setActiveTab} visitas={visitas} db={db} notify={showNotice} />}
                        {activeTab === 'farmacias' && <FarmaciasView data={farmacias} db={db} notify={showNotice} />}
                        {activeTab === 'productos' && <ProductosView data={productos} db={db} notify={showNotice} />}
                        {activeTab === 'visita' && <VisitaView farmacias={farmacias} productos={productos} visitas={visitas} db={db} setTab={setActiveTab} notify={showNotice} />}
                        {activeTab === 'metricas' && <MetricasView farmacias={farmacias} visitas={visitas} productos={productos} />}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center px-2 py-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
                        <NavItem icon="home" label="Inicio" active={activeTab === 'inicio'} onClick={() => setActiveTab('inicio')} />
                        <NavItem icon="map-pin" label="Farmacias" active={activeTab === 'farmacias'} onClick={() => setActiveTab('farmacias')} />
                        <NavItem icon="package" label="Catálogo" active={activeTab === 'productos'} onClick={() => setActiveTab('productos')} />
                        <NavItem icon="bar-chart-3" label="Métricas" active={activeTab === 'metricas'} onClick={() => setActiveTab('metricas')} />
                    </nav>
                </div>
            );
        }

        // --- VISTAS ESPECÍFICAS ---

        function NavItem({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center flex-1 py-1 transition-colors ${active ? 'text-blue-600' : 'text-gray-400'}`}>
                    <i data-lucide={icon} className={`w-6 h-6 ${active ? 'fill-blue-50' : ''}`}></i>
                    <span className="text-[10px] mt-1 font-bold uppercase tracking-tighter">{label}</span>
                </button>
            );
        }

        function InicioView({ setTab, visitas, db, notify }) {
            const hoy = new Date().toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const borrarVisita = async (id) => {
                await deleteDoc(doc(db, 'visitas', id));
                notify("Visita eliminada", "info");
            };

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center">
                        <p className="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">Tu jornada de hoy</p>
                        <h2 className="text-2xl font-black text-gray-800 capitalize">{hoy}</h2>
                    </div>
                    <button onClick={() => setTab('visita')} className="w-full bg-blue-600 text-white py-5 rounded-2xl shadow-xl shadow-blue-200 flex items-center justify-center space-x-3 active:scale-95 transition-transform">
                        <i data-lucide="plus-circle" className="w-6 h-6"></i>
                        <span className="text-lg font-bold">NUEVA VISITA</span>
                    </button>
                    <div className="space-y-3">
                        <h3 className="font-black text-gray-700 ml-1 uppercase text-xs tracking-wider">HISTORIAL RECIENTE</h3>
                        {visitas.length === 0 ? <p className="text-gray-400 italic text-sm text-center py-10 bg-white rounded-2xl border border-dashed">Sin visitas registradas...</p> : 
                        visitas.slice(0, 5).map(v => (
                            <div key={v.id} className="bg-white p-4 rounded-xl border-l-4 border-blue-600 shadow-sm flex justify-between items-center transition-all hover:translate-x-1">
                                <div>
                                    <p className="font-bold text-gray-800">Visita realizada</p>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase">{new Date(v.fecha).toLocaleString()}</p>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <i data-lucide="check-circle-2" className="text-green-500 w-6 h-6"></i>
                                    <button onClick={() => borrarVisita(v.id)} className="text-gray-300 hover:text-red-500 transition-colors p-1">
                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function FarmaciasView({ data, db, notify }) {
            const [form, setForm] = useState(false);
            const [nombre, setNombre] = useState('');
            const [cadena, setCadena] = useState('INDEPENDIENTE');
            const [zona, setZona] = useState('');

            const guardar = async (e) => {
                e.preventDefault();
                await addDoc(collection(db, 'farmacias'), { 
                    nombre: nombre.toUpperCase(), 
                    cadena, 
                    zona: zona.toUpperCase() 
                });
                setForm(false); setNombre(''); setZona('');
                notify("Farmacia guardada ✅");
            };

            const borrar = async (id) => {
                await deleteDoc(doc(db, 'farmacias', id));
                notify("Farmacia eliminada", "info");
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-black uppercase text-gray-800">Directorio</h2>
                        <button onClick={() => setForm(!form)} className="bg-blue-600 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide={form ? "x" : "plus"} className="w-6 h-6"></i>
                        </button>
                    </div>

                    {form && (
                        <form onSubmit={guardar} className="bg-white p-6 rounded-2xl shadow-xl space-y-4 border-2 border-blue-50">
                            <input type="text" placeholder="NOMBRE DE LA FARMACIA" value={nombre} onChange={e => setNombre(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 text-base" required />
                            <select value={cadena} onChange={e => setCadena(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none text-base font-bold">
                                <option>LA REBAJA</option><option>LA ALEMANA</option><option>CRUZ VERDE</option>
                                <option>FARMATODO</option><option>ECONOMIA</option><option>FARMANORTE</option>
                                <option>PAGUE MENOS</option><option>INDEPENDIENTE</option>
                            </select>
                            <input type="text" placeholder="ZONA (EJ: NORTE)" value={zona} onChange={e => setZona(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none text-base" required />
                            <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">GUARDAR FARMACIA</button>
                        </form>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        {data.map(f => (
                            <div key={f.id} className="bg-white p-4 rounded-xl shadow-sm flex justify-between border border-gray-100">
                                <div><p className="font-bold text-gray-800">{f.nombre}</p><p className="text-xs text-blue-500 font-bold uppercase">{f.cadena} · {f.zona}</p></div>
                                <button onClick={() => borrar(f.id)} className="text-red-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProductosView({ data, db, notify }) {
            const [form, setForm] = useState(false);
            const [nombre, setNombre] = useState('');
            const [presentacion, setPresentacion] = useState('');

            const guardar = async (e) => {
                e.preventDefault();
                await addDoc(collection(db, 'productos'), { 
                    nombre: nombre.toUpperCase(), 
                    presentacion: presentacion.toUpperCase(), 
                    marca: 'ABBOTT' 
                });
                setForm(false); setNombre(''); setPresentacion('');
                notify("Producto registrado ✅");
            };

            const borrar = async (id) => {
                await deleteDoc(doc(db, 'productos', id));
                notify("Producto eliminado", "info");
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-black uppercase text-gray-800">Mis Productos</h2>
                        <button onClick={() => setForm(!form)} className="bg-blue-600 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide={form ? "x" : "plus"} className="w-6 h-6"></i>
                        </button>
                    </div>

                    {form && (
                        <form onSubmit={guardar} className="bg-white p-6 rounded-2xl shadow-xl space-y-4 border-2 border-blue-50">
                            <div className="p-4 bg-gray-100 rounded-xl text-gray-400 font-bold uppercase text-[10px] tracking-widest text-center">Marca: ABBOTT</div>
                            <input type="text" placeholder="REFERENCIA / NOMBRE" value={nombre} onChange={e => setNombre(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 text-base" required />
                            <input type="text" placeholder="PRESENTACIÓN (EJ: CAJA X30)" value={presentacion} onChange={e => setPresentacion(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none text-base" required />
                            <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">REGISTRAR PRODUCTO</button>
                        </form>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        {data.map(p => (
                            <div key={p.id} className="bg-white p-4 rounded-xl shadow-sm flex justify-between border-l-4 border-gray-800">
                                <div><p className="font-bold text-gray-800">{p.nombre}</p><p className="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">ABBOTT · {p.presentacion}</p></div>
                                <button onClick={() => borrar(p.id)} className="text-red-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function VisitaView({ farmacias, productos, visitas, db, setTab, notify }) {
            const [sel, setSel] = useState(null);
            const [inventario, setInventario] = useState({});
            const [ultima, setUltima] = useState(null);

            const iniciar = (f) => {
                setSel(f);
                const prev = visitas.filter(v => v.id_farmacia === f.id).sort((a,b) => new Date(b.fecha) - new Date(a.fecha))[0];
                if (prev) { setInventario(prev.estado_inventario || {}); setUltima(new Date(prev.fecha).toLocaleDateString()); }
                else { setInventario({}); setUltima(null); }
            };

            const guardar = async () => {
                await addDoc(collection(db, 'visitas'), {
                    fecha: new Date().toISOString(),
                    id_farmacia: sel.id,
                    estado_inventario: inventario
                });
                notify("Reporte finalizado con éxito 🚀");
                setTab('inicio');
            };

            const marcas = productos.reduce((acc, p) => {
                let m = (p.marca || 'ABBOTT').toUpperCase().trim();
                if (m === 'ABBOT') m = 'ABBOTT';
                if (!acc[m]) acc[m] = []; acc[m].push(p); return acc;
            }, {});

            if (!sel) return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black mb-6 uppercase text-gray-800">Selecciona Farmacia</h2>
                    {farmacias.length === 0 ? <p className="text-center text-gray-400 py-10 bg-white rounded-2xl border border-dashed">Agregue farmacias primero</p> : 
                    farmacias.map(f => (
                        <button key={f.id} onClick={() => iniciar(f)} className="w-full text-left bg-white p-6 rounded-2xl shadow-sm flex items-center space-x-4 active:bg-blue-50 transition-all border border-transparent active:border-blue-200">
                            <div className="bg-blue-100 p-3 rounded-full text-blue-600 shrink-0"><i data-lucide="store"></i></div>
                            <div><p className="font-bold text-lg leading-tight">{f.nombre}</p><p className="text-[10px] mt-1 text-gray-400 font-bold uppercase tracking-widest">{f.cadena}</p></div>
                        </button>
                    ))}
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="flex items-center space-x-3 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <button onClick={() => setSel(null)} className="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="arrow-left" className="w-6 h-6 text-gray-400"></i></button>
                        <div className="flex-1 text-center">
                            <h2 className="text-lg font-black text-blue-700 leading-tight">{sel.nombre}</h2>
                            {ultima && <p className="text-[10px] text-gray-400 font-bold uppercase">Anterior: {ultima}</p>}
                        </div>
                    </div>

                    {Object.entries(marcas).map(([m, ps]) => (
                        <div key={m} className="space-y-3">
                            <div className="bg-gray-200 px-4 py-2 rounded-lg text-[10px] font-black uppercase text-gray-600 tracking-widest text-center">{m}</div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {ps.map(p => (
                                    <div key={p.id} className="bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between shadow-sm">
                                        <div className="mb-4 text-center sm:text-left"><p className="font-bold text-gray-800 leading-tight">{p.nombre}</p><p className="text-[9px] text-gray-400 uppercase font-black tracking-tighter">{p.presentacion}</p></div>
                                        <div className="flex space-x-2">
                                            <button onClick={() => setInventario({...inventario, [p.id]: 'disponible'})} className={`flex-1 py-4 rounded-xl font-black text-xs transition-all ${inventario[p.id] === 'disponible' ? 'bg-green-500 text-white shadow-lg shadow-green-100 scale-[1.02]' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}>SI</button>
                                            <button onClick={() => setInventario({...inventario, [p.id]: 'agotado'})} className={`flex-1 py-4 rounded-xl font-black text-xs transition-all ${inventario[p.id] === 'agotado' ? 'bg-red-500 text-white shadow-lg shadow-red-100 scale-[1.02]' : 'bg-gray-50 text-gray-400 hover:bg-gray-100'}`}>NO</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                    <button onClick={guardar} className="w-full bg-blue-700 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-transform uppercase tracking-widest mt-10">FINALIZAR REPORTE</button>
                </div>
            );
        }

        function MetricasView({ farmacias, visitas, productos }) {
            if (visitas.length === 0) return <div className="h-full flex flex-col items-center justify-center p-10 bg-white rounded-3xl border border-dashed"><i data-lucide="bar-chart" className="w-20 h-20 text-gray-100 mb-4"></i><p className="text-gray-400 font-bold uppercase text-[10px] tracking-widest text-center">Faltan reportes para el análisis aún</p></div>;

            const stats = useMemo(() => {
                const s = { cadenas: {}, zonas: {}, refs: {} };
                visitas.forEach(v => {
                    const farm = farmacias.find(f => f.id === v.id_farmacia);
                    const cad = farm?.cadena || 'OTRA';
                    const zon = farm?.zona || 'OTRA';
                    if (!s.cadenas[cad]) s.cadenas[cad] = { r: 0, a: 0 };
                    if (!s.zonas[zon]) s.zonas[zon] = { r: 0, a: 0 };
                    
                    Object.entries(v.estado_inventario || {}).forEach(([pid, est]) => {
                        const prod = productos.find(p => p.id === pid);
                        const rName = prod ? `${prod.nombre} (${prod.presentacion})` : 'Ref. Eliminada';
                        if (!s.refs[rName]) s.refs[rName] = { r: 0, a: 0 };
                        s.cadenas[cad].r++; s.zonas[zon].r++; s.refs[rName].r++;
                        if (est === 'agotado') { s.cadenas[cad].a++; s.zonas[zon].a++; s.refs[rName].a++; }
                    });
                });
                return s;
            }, [visitas, farmacias, productos]);

            const Bar = ({ label, stats }) => {
                const perc = Math.round(((stats.r - stats.a) / stats.r) * 100) || 0;
                return (
                    <div className="mb-6">
                        <div className="flex justify-between text-[10px] font-black uppercase mb-1"><span>{label}</span><span className={perc < 70 ? 'text-red-500 font-black' : 'text-green-600 font-black'}>{perc}% DISP.</span></div>
                        <div className="w-full bg-gray-100 h-3 rounded-full overflow-hidden"><div className={`h-full transition-all duration-1000 ${perc < 70 ? 'bg-red-500' : 'bg-green-500'}`} style={{width: `${perc}%`}}></div></div>
                    </div>
                );
            };

            const globalPerc = Math.round(((Object.values(stats.refs).reduce((a,b)=>a+(b.r-b.a),0))/Object.values(stats.refs).reduce((a,b)=>a+b.r,0))*100) || 0;

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-gray-800 uppercase">Estadísticas de Zona</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-blue-700 text-white p-6 rounded-3xl shadow-lg shadow-blue-100"><p className="text-[10px] font-black uppercase opacity-60 tracking-widest">Reportes</p><p className="text-4xl font-black">{visitas.length}</p></div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100"><p className="text-[10px] font-black uppercase text-gray-300 tracking-widest">Salud Stock</p><p className={`text-4xl font-black ${globalPerc < 70 ? 'text-red-500' : 'text-green-500'}`}>{globalPerc}%</p></div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-8 flex items-center justify-center border-b pb-4"><i data-lucide="trending-up" className="w-4 h-4 mr-2 text-blue-500"></i> Disponibilidad por Cadena</h3>
                        {Object.entries(stats.cadenas).map(([k,v]) => <Bar key={k} label={k} stats={v} />)}
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6 flex items-center justify-center border-b pb-4"><i data-lucide="package-search" className="w-4 h-4 mr-2 text-indigo-500"></i> Situación por Referencia</h3>
                        <div className="space-y-3">
                            {Object.entries(stats.refs).sort((a,b)=>((a[1].r-a[1].a)/a[1].r) - ((b[1].r-b[1].a)/b[1].r)).map(([k,v]) => (
                                <div key={k} className="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <p className="text-[9px] font-black uppercase text-gray-700 w-2/3 leading-tight tracking-tighter">{k}</p>
                                    <p className={`text-sm font-black ${((v.r-v.a)/v.r) < 0.7 ? 'text-red-500' : 'text-green-600'}`}>{Math.round(((v.r-v.a)/v.r)*100) || 0}%</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
